<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data:; font-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';"
    />
    <title>TranslateMate</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="TranslateMate shell">
      <section class="bubble" id="speech-bubble" aria-live="polite" tabindex="0" aria-label="번역 결과 말풍선">
        <p id="bubble-text">TranslateMate 준비 완료</p>
      </section>

      <section class="translate-prompt hidden" id="translate-prompt" aria-hidden="true">
        <form class="translate-form" id="translate-form" novalidate>
          <label class="translate-label" for="translate-input">번역 입력</label>
          <textarea
            id="translate-input"
            class="translate-input"
            rows="4"
            maxlength="2000"
            placeholder="번역할 텍스트를 입력하거나 단축키로 클립보드를 불러오세요."
          ></textarea>
          <p id="translate-error" class="translate-error" role="alert"></p>
          <div class="translate-actions">
            <button id="translate-cancel" type="button">취소 (Esc)</button>
            <button id="translate-submit" type="submit">확인 (Enter)</button>
          </div>
        </form>
      </section>

      <section class="character state-idle" id="character" role="button" tabindex="0" aria-label="캐릭터 셸">
        <div class="character-eye left"></div>
        <div class="character-eye right"></div>
        <div class="character-mouth"></div>
      </section>

      <aside class="debug-panel" id="debug-panel" aria-label="상태 디버그">
        <p><strong>state</strong>: <span id="debug-state">idle</span></p>
        <p><strong>pos</strong>: <span id="debug-pos">0, 0</span></p>
        <p><strong>vel</strong>: <span id="debug-vel">0, 0</span></p>
      </aside>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
