<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';"
    />
    <title>TranslateMate Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <main class="settings-shell">
      <h1>TranslateMate 설정</h1>
      <form id="settings-form" class="settings-form" novalidate>
        <section class="card">
          <h2>Papago API</h2>
          <label for="papago-client-id">Client ID</label>
          <input id="papago-client-id" type="text" autocomplete="off" />
          <label for="papago-client-secret">Client Secret</label>
          <input id="papago-client-secret" type="password" autocomplete="off" />
          <p class="hint">비워두면 기존 키를 유지합니다. 변경 시 두 필드를 모두 입력하세요.</p>
          <p id="credential-state" class="meta"></p>
          <button id="delete-credentials" type="button" class="danger">저장된 API 키 삭제</button>
        </section>

        <section class="card">
          <h2>동작 옵션</h2>
          <label for="target-lang">기본 번역 언어</label>
          <select id="target-lang">
            <option value="ko">한국어 (ko)</option>
            <option value="en">영어 (en)</option>
            <option value="ja">일본어 (ja)</option>
            <option value="zh-CN">중국어 간체 (zh-CN)</option>
            <option value="zh-TW">중국어 번체 (zh-TW)</option>
            <option value="es">스페인어 (es)</option>
            <option value="fr">프랑스어 (fr)</option>
            <option value="de">독일어 (de)</option>
            <option value="ru">러시아어 (ru)</option>
            <option value="vi">베트남어 (vi)</option>
            <option value="th">태국어 (th)</option>
            <option value="id">인도네시아어 (id)</option>
          </select>

          <label for="move-speed">이동 속도 배율 <span id="move-speed-value">1.0x</span></label>
          <input id="move-speed" type="range" min="0.5" max="2.5" step="0.1" value="1" />

          <label for="translate-shortcut">번역 단축키</label>
          <input id="translate-shortcut" type="text" spellcheck="false" placeholder="CommandOrControl+Shift+T" />

          <label class="checkbox-row" for="sound-enabled">
            <input id="sound-enabled" type="checkbox" />
            <span>알림음 사용</span>
          </label>

          <label class="checkbox-row" for="clipboard-auto-submit">
            <input id="clipboard-auto-submit" type="checkbox" />
            <span>클립보드 자동 제출</span>
          </label>
        </section>

        <p id="save-message" class="save-message" role="status" aria-live="polite"></p>

        <div class="actions">
          <button id="close-button" type="button" class="ghost">닫기</button>
          <button type="submit" class="primary">저장</button>
        </div>
      </form>
    </main>

    <script src="./settings.js"></script>
  </body>
</html>
